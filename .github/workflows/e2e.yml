name: Frontend E2E

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: playwright e2e (chromium / firefox / webkit)
    runs-on: ubuntu-latest
    env:
      # E2EはモックGhostサーバー(e2e/mock-ghost)を使うため実際のシークレットは不要
      GHOST_API_URL: http://127.0.0.1:3999
      GHOST_CONTENT_KEY: "0123456789abcdef0123456789"
      GHOST_FRONT_URL: http://127.0.0.1:3999
      FRONTEND_URL: http://127.0.0.1:4321
      EXTERNAL_BLOGS: "[]"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json

      - name: Enable Corepack
        run: corepack enable pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(cd frontend && pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          echo "VERSION=$(cd frontend && node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup Playwright browsers cache
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && pnpm exec playwright install --with-deps chromium firefox webkit

      # ブラウザ本体はキャッシュされるがOSの依存ライブラリはランナーごとに必要
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd frontend && pnpm exec playwright install-deps chromium firefox webkit

      - name: Build
        run: cd frontend && pnpm build

      - name: Run E2E tests
        run: cd frontend && pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
