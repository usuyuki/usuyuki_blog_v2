name: Build Docker Image

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  push_to_registry:
    name: Push Docker image to GitHub Container Registry
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.USUYUKI_GITHUB_TOKEN }}

      # arm64とamd64両対応のため
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push to GitHub Container Registry
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./infra/prod/astro/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/usuyuki_blog_v2_astro:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/usuyuki_blog_v2_astro:latest
          labels: latest
          cache-from: type=gha,scope=astro-build
          cache-to: type=gha,mode=max,scope=astro-build

