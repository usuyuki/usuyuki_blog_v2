name: Build Docker Image

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  push_to_registry:
    name: Push Docker image to GitHub Container Registry
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.USUYUKI_GITHUB_TOKEN }}

      # arm64гЃЁamd64дёЎеЇѕеїњгЃ®гЃџг‚Ѓ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push to GitHub Container Registry
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./infra/prod/astro/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/usuyuki_blog_v2_astro:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/usuyuki_blog_v2_astro:latest
          labels: latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

        # зЏѕзЉ¶гЃѕгЃ г‚­гѓЈгѓѓг‚·гѓҐи‡Єе‹•е‰Љй™¤гЃ®д»•зµ„гЃїгЃЊгЃ§гЃЌгЃ¦гЃ„гЃЄгЃ„г‚‰гЃ—гЃ„в†’https://docs.docker.com/build/ci/github-actions/cache/
        # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
